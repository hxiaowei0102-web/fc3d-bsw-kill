name: 百十个杀码每日更新

on:
  schedule:
    # 北京时间 22:00 (UTC 14:00) — 开奖后30分钟
    - cron: '0 14 * * *'
    # 北京时间 23:30 (UTC 15:30) — 第一次兜底
    - cron: '30 15 * * *'
    # 北京时间 01:00 (UTC 17:00) — 第二次兜底
    - cron: '0 17 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests --quiet

      - name: 运行云端更新
        run: python cloud_update.py

      - name: 提交变更
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add fc3d-history.csv index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "自动更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: github-pages

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
